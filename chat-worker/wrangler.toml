name = "personal-website-chat"
main = "src/index.js"
compatibility_date = "2026-07-11"
workers_dev = true

[vars]
# Comma-separated exact origins. Do not use * in production.
ALLOWED_ORIGINS = "https://mantoshkumar1.github.io"
OPENAI_MODEL = "gpt-5.5"
MAX_QUESTION_LENGTH = "1000"
OPENAI_TIMEOUT_MS = "15000"
MAX_OUTPUT_TOKENS = "700"
EMBEDDING_MODEL = "text-embedding-3-small"
RETRIEVAL_TOP_K = "5"
RETRIEVAL_MAX_CONTEXT_CHARS = "8000"
SEMANTIC_SCORE_THRESHOLD = "0.25"
CONVERSATION_HISTORY_TURNS = "6"
CONVERSATION_TTL_SECONDS = "86400"
RECOMMENDATION_LIMIT = "6"

[secrets]
required = ["OPENAI_API_KEY", "INDEXER_TOKEN"]

# Set OPENAI_API_KEY with `npx wrangler secret put OPENAI_API_KEY`.
# Do not put secrets in this file or commit a .dev.vars file.
#
# Optional future rate-limiting binding. The worker detects this binding when
# configured and calls `RATE_LIMITER.limit({ key })` before OpenAI.
# [[ratelimits]]
# name = "RATE_LIMITER"
# namespace_id = "replace-with-your-Cloudflare-namespace-id"
# simple = { limit = 20, period = 60 }
#
# Required RAG storage bindings. Create the resources with the commands in
# README.md, then add the generated binding snippets here.
# [[d1_databases]]
# binding = "KNOWLEDGE_DB"
# database_name = "personal-website-knowledge"
# database_id = "replace-with-your-D1-database-id"
#
# [[vectorize]]
# binding = "KNOWLEDGE_INDEX"
# index_name = "personal-website-knowledge"
