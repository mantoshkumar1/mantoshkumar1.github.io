name = "ask-mantosh"
main = "src/index.js"
compatibility_date = "2026-07-11"
workers_dev = true

[vars]
# Comma-separated exact origins. Do not use * in production.
ALLOWED_ORIGINS = "https://mantoshkumar1.github.io"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"
MAX_QUESTION_LENGTH = "1000"
AI_TIMEOUT_MS = "20000"
MAX_OUTPUT_TOKENS = "300"
MAX_ANSWER_CHARS = "6000"
AI_EMBEDDING_MODEL = "@cf/baai/bge-m3"
RETRIEVAL_TOP_K = "5"
RETRIEVAL_MAX_CONTEXT_CHARS = "8000"
SEMANTIC_SCORE_THRESHOLD = "0.25"
CONVERSATION_HISTORY_TURNS = "6"
CONVERSATION_TTL_SECONDS = "86400"
RECOMMENDATION_LIMIT = "6"
FREE_DAILY_REQUEST_LIMIT = "450"
FREE_PER_MINUTE_REQUEST_LIMIT = "30"
GITHUB_OIDC_AUDIENCE = "ask-mantosh-indexer"
GITHUB_REPOSITORY = "mantoshkumar1/mantoshkumar1.github.io"
GITHUB_SYNC_REF = "refs/heads/main"

[secrets]
required = ["INDEXER_TOKEN"]

# INDEXER_TOKEN protects the private GitHub-to-Worker indexing endpoint.
# Do not put secrets in this file or commit a .dev.vars file.
#
# This mandatory per-client limiter protects every chat route from abuse.
# The stricter shared AI/retrieval quota is enforced separately in D1.
# Keep namespace_id unique within the Cloudflare account.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "31001"
simple = { limit = 30, period = 60 }
#
# Required RAG storage bindings.
[[d1_databases]]
binding = "KNOWLEDGE_DB"
database_name = "personal-website-knowledge"
database_id = "66ebeda4-a0f0-480e-bcbd-78d44875dc8e"
#
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "ask-mantosh-knowledge-v3"
#
# [[kv_namespaces]]
# binding = "CACHE_VERSION"
# id = "replace-with-your-KV-namespace-id"

[ai]
binding = "AI"
