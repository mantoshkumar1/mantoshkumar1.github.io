name: Build and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/generate-seo.mjs
      - run: node scripts/seo-audit.mjs
      - run: node scripts/validate-discoverability.mjs
      - run: node scripts/validate-xml-feeds.mjs
      - run: node scripts/audit-links.mjs
      - run: node scripts/audit-accessibility.mjs
      - run: node scripts/audit-docs.mjs
      - run: node scripts/audit-content-sections.mjs
      - run: node scripts/build-pages.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
